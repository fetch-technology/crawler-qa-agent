<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crawler QA Agent</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Crawler QA Agent</h1>
      <div class="topbar-status" id="queueStatus">—</div>
    </header>

    <main>
      <section class="card">
        <h2>New Task</h2>
        <p class="muted" style="margin-top:-4px">Tạo task ở idle — click <strong>1. Collect Context</strong> trong bảng dưới để chạy phase đầu, rồi <strong>2. Generate Tests</strong>, rồi <strong>3. Run Tests</strong>.</p>
        <div id="errorBanner" class="error hidden"></div>
        <form id="newTaskForm" class="row">
          <label class="col grow">
            <span class="label">Game URL</span>
            <input
              type="url"
              name="gameUrl"
              placeholder="https://..."
              required
              autocomplete="off"
              spellcheck="false"
            />
          </label>
          <label class="col">
            <span class="label">Spins / test</span>
            <input type="number" name="spinsPerTest" value="3" min="1" max="1000" />
          </label>
          <label class="col" style="justify-content:flex-end">
            <span class="label">&nbsp;</span>
            <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">
              <input type="checkbox" name="autoStartAll" id="autoStartAll" />
              <label for="autoStartAll">Auto-run all phases</label>
            </span>
          </label>
          <div class="col align-end">
            <span class="label">&nbsp;</span>
            <button type="submit" class="btn primary">Create Task</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>Tasks</h2>
          <span class="muted" id="taskCount"></span>
        </div>
        <table class="tasks-table">
          <thead>
            <tr>
              <th></th>
              <th>Game</th>
              <th>Provider</th>
              <th>URL</th>
              <th>Status</th>
              <th>Spins</th>
              <th>RTP</th>
              <th>Duration</th>
              <th>Updated</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tasksBody"></tbody>
        </table>
      </section>

      <section class="card hidden" id="detailPanel">
        <div class="section-title">
          <h2 id="detailTitle">Task detail</h2>
          <button class="btn ghost" id="closeDetail">Close</button>
        </div>
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-tabs">
          <button class="tab active" data-tab="cases">Test Cases</button>
          <button class="tab" data-tab="qa">QA View</button>
          <button class="tab" data-tab="context">Context (AI inputs)</button>
          <button class="tab" data-tab="json">JSON</button>
          <button class="tab" data-tab="errors">Errors <span class="tab-badge hidden" id="errorsBadge">0</span></button>
          <button class="tab" data-tab="spins">Spin Events</button>
          <button class="tab" data-tab="shots">Screenshots</button>
          <button class="tab" data-tab="log">Full Log</button>
        </div>
        <div class="detail-pane" id="pane-cases"></div>
        <div class="detail-pane hidden" id="pane-qa"></div>
        <div class="detail-pane hidden" id="pane-context"></div>
        <div class="detail-pane hidden" id="pane-json"></div>
        <div class="detail-pane hidden" id="pane-errors"></div>
        <div class="detail-pane hidden" id="pane-spins"></div>
        <div class="detail-pane hidden" id="pane-shots"></div>
        <pre class="detail-pane hidden" id="pane-log"></pre>
      </section>
    </main>

    <div class="shot-modal hidden" id="shotModal">
      <div class="shot-modal-bar">
        <span id="shotModalLabel">—</span>
        <button class="btn small" id="shotModalClose">Close</button>
      </div>
      <img id="shotModalImg" />
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
