<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QA Login — crawler-qa-agent</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0b0e13; color: #e6eaf0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      width: 340px; padding: 28px 26px; background: #11151c;
      border: 1px solid #232a35; border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    h1 { font-size: 17px; margin: 0 0 4px; }
    .sub { color: #8b939c; font-size: 12px; margin: 0 0 20px; }
    label { display: block; font-size: 11px; color: #8b939c; text-transform: uppercase; letter-spacing: 0.05em; margin: 14px 0 5px; }
    input {
      width: 100%; padding: 9px 11px; background: #0b0e13; color: #e6eaf0;
      border: 1px solid #2a3140; border-radius: 6px; font-size: 14px;
    }
    input:focus { outline: none; border-color: #4f7fd0; }
    button {
      width: 100%; margin-top: 22px; padding: 10px; font-size: 14px; font-weight: 600;
      background: #3a6fc4; color: #fff; border: none; border-radius: 6px; cursor: pointer;
    }
    button:hover { background: #4f7fd0; }
    button:disabled { opacity: 0.5; cursor: default; }
    .err { margin-top: 14px; color: #e8807f; font-size: 12px; min-height: 16px; }
    .brand { color: #6d7785; font-size: 11px; margin-top: 22px; text-align: center; }
  </style>
</head>
<body>
  <form class="card" id="loginForm" autocomplete="on">
    <h1>QA Dashboard</h1>
    <p class="sub">Sign in to continue</p>
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" autofocus required />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required />
    <button id="submitBtn" type="submit">Sign in</button>
    <div class="err" id="err"></div>
    <div class="brand">crawler-qa-agent</div>
  </form>
  <script>
    const form = document.getElementById("loginForm");
    const errEl = document.getElementById("err");
    const btn = document.getElementById("submitBtn");
    function nextUrl() {
      try {
        const n = new URL(location.href).searchParams.get("next");
        if (n && n.startsWith("/") && !n.startsWith("//")) return n;
      } catch (_) {}
      return "/";
    }
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.textContent = "";
      btn.disabled = true;
      try {
        const r = await fetch("/api/qa/auth/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value,
          }),
        });
        const data = await r.json().catch(() => ({}));
        if (r.ok && data.ok) {
          location.href = nextUrl();
        } else {
          errEl.textContent = data.error || "Sign-in failed";
          btn.disabled = false;
        }
      } catch (err) {
        errEl.textContent = "Could not reach the server";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
